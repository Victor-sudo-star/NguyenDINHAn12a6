<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Bài kiểm tra</title>
</head>
<body>
    <h1>Bài kiểm tra trắc nghiệm</h1>
    <form>
        <p><b>Câu 1:</b> Thẻ nào dùng để tạo danh sách không thứ tự?</p>
        <input type="radio" name="q1"> &lt;ol&gt; <br>
        <input type="radio" name="q1"> &lt;ul&gt; <br>
        <input type="radio" name="q1"> &lt;li&gt; <br>
        <input type="radio" name="q1"> &lt;list&gt; <br>

        <p><b>Câu 2:</b> Thuộc tính nào dùng để gộp cột trong bảng?</p>
        <input type="radio" name="q2"> rowspan <br>
        <input type="radio" name="q2"> colspan <br>
        <input type="radio" name="q2"> border <br>
        <input type="radio" name="q2"> bgcolor <br>

        <p><b>Câu 3 (Tự luận):</b> Em hãy nêu cảm nhận của mình về lớp 12A.</p>
        <textarea rows="4" cols="50"></textarea>
        <br><br>
        
        <p>Đính kèm bài làm chi tiết (nếu có):</p>
        <input type="file" name="file_baitap">
        <br><br>
        
        <input type="submit" value="Nộp bài">
    </form>
</body>
</html>
